---
name: Release qnapexporter

on: # yamllint disable-line rule:truthy
  release:
    types: [created]

jobs:
  build-image-qdk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build docker image with QDK
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          file: qpkg/Dockerfile
          tags: qdk-image:latest
          outputs: type=docker,dest=/tmp/qdk-image.tar

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: qdk-image.tar
          path: /tmp/qdk-image.tar

  release-qnapexporter:
    name: release qnapexporter
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm, goarm: 5 }
          - { goos: linux, goarch: arm, goarm: 6 }
          - { goos: linux, goarch: arm, goarm: 7 }
          - { goos: linux, goarch: arm64 }
    permissions:
      contents: write # for wangyoucao577/go-release-action to upload assets
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          PACKAGE_VERSION: ${{ github.ref_name }}
        run: mise run build

      - name: Compress binary
        run: |
          cd bin
          tar -czf qnapexporter-${{ matrix.goarch == 'arm' && format('{0}-{1}v{2}', matrix.goos, matrix.goarch, matrix.goarm) || format('{0}-{1}', matrix.goos, matrix.goarch) }}.tar.gz qnapexporter
          md5sum qnapexporter-${{ matrix.goarch == 'arm' && format('{0}-{1}v{2}', matrix.goos, matrix.goarch, matrix.goarm) || format('{0}-{1}', matrix.goos, matrix.goarch) }}.tar.gz > qnapexporter-${{ matrix.goarch == 'arm' && format('{0}-{1}v{2}', matrix.goos, matrix.goarch, matrix.goarm) || format('{0}-{1}', matrix.goos, matrix.goarch) }}.tar.gz.md5

      - name: Upload release assets
        uses: svenstaro/upload-release-action@29e53e917877a24fad85510ded594ab3c9ca12de # 2.11.5
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: bin/qnapexporter-${{ matrix.goarch == 'arm' && format('{0}-{1}v{2}', matrix.goos, matrix.goarch, matrix.goarm) || format('{0}-{1}', matrix.goos, matrix.goarch) }}.tar.gz*
          file_glob: true
          tag: ${{ github.ref_name }}
          overwrite: true

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: qnapexporter-${{ matrix.goarch == 'arm' && format('{0}-{1}v{2}', matrix.goos, matrix.goarch, matrix.goarm) || format('{0}-{1}', matrix.goos, matrix.goarch) }}
          path: bin/qnapexporter
          retention-days: 30

  release-qpkg:
    name: release qpkg
    runs-on: ubuntu-latest
    needs: [build-image-qdk, release-qnapexporter]
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm, goarm: 5 }
          - { goos: linux, goarch: arm, goarm: 6 }
          - { goos: linux, goarch: arm, goarm: 7 }
          - { goos: linux, goarch: arm64 }
    permissions:
      contents: write # for wangyoucao577/go-release-action to upload assets

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Download qnapexporter artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: qnapexporter-${{ matrix.goarch == 'arm' && format('{0}-{1}v{2}', matrix.goos, matrix.goarch, matrix.goarm) || format('{0}-{1}', matrix.goos, matrix.goarch) }}
          path: qpkg/shared/

      - name: Download qdk-image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: qdk-image.tar
          path: /tmp

      - name: Prepare QPKG build
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          # QNAP App Center requires a numeric QPKG_VER (e.g. 1.3.2); strip the
          # leading "v" from the tag so it matches the version advertised in
          # repo.xml and the App Center can detect updates. qbuild names the
          # output file after QPKG_VER, so expose it for later steps.
          QPKG_VER="${REF_NAME#v}"
          echo "QPKG_VER=${QPKG_VER}" >> "$GITHUB_ENV"
          sed -i "s/QPKG_VER=\"0.0.0\"/QPKG_VER=\"${QPKG_VER}\"/g" ./qpkg/qpkg.cfg
          chmod 755 qpkg/shared/qnapexporter
          docker load --input /tmp/qdk-image.tar

      - name: Build qpkg for qnapexporter
        run: docker run --rm -v ${{ github.workspace }}:/work qdk-image:latest /usr/share/QDK/bin/qbuild --root /work/qpkg/

      - name: Validate qpkg file size
        run: |
          QPKG_FILE="qpkg/build/QNAPExporter_${QPKG_VER}.qpkg"
          if [ ! -f "$QPKG_FILE" ]; then
            echo "::error::QPKG file not found: $QPKG_FILE"
            exit 1
          fi
          SIZE=$(stat -c%s "$QPKG_FILE")
          echo "QPKG file size: $SIZE bytes"
          if [ "$SIZE" -lt 1000000 ]; then
            echo "::error::QPKG file is too small ($SIZE bytes). Expected at least 1MB. Build likely failed."
            exit 1
          fi

      - name: Validate qpkg trailer
        run: ./qpkg/validate-tail.sh "qpkg/build/QNAPExporter_${QPKG_VER}.qpkg"

      - name: Release qpkg
        uses: svenstaro/upload-release-action@29e53e917877a24fad85510ded594ab3c9ca12de # 2.11.5
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          file: qpkg/build/QNAPExporter_${{ env.QPKG_VER }}.qpkg
          asset_name: QNAPExporter_${{ github.ref_name }}_${{ matrix.goarch == 'arm' && format('{0}v{1}', matrix.goarch, matrix.goarm) || format('{0}', matrix.goarch) }}.qpkg
          overwrite: true
