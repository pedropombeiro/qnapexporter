---
extends: default

rules:
  braces:
    # GitHub Actions expressions (${{ ... }}) require spaces inside braces.
    max-spaces-inside: 1
  line-length:
    max: 400
    level: warning
  document-start: disable
  comments:
    min-spaces-from-content: 1
  comments-indentation: disable
  truthy:
    check-keys: false
