---
name: Build qnapexporter

on: # yamllint disable-line rule:truthy
  push:
    branches:
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4

      - name: Run tests
        run: mise run test

      - name: Build
        run: mise run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: qnapexporter
          path: bin/qnapexporter
          retention-days: 30

  build-image-qdk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Build docker image with QDK
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: qpkg/Dockerfile
          tags: qdk-image:latest
          outputs: type=docker,dest=/tmp/qdk-image.tar

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: qdk-image.tar
          path: /tmp/qdk-image.tar

  build-qpkg:
    runs-on: ubuntu-latest
    needs: [build, build-image-qdk]

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Download qnapexporter artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: qnapexporter
          path: qpkg/shared/

      - name: Download qdk-image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: qdk-image.tar
          path: /tmp

      - name: Set git sha_short
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Prepare QPKG build
        run: |
          sed -i 's/QPKG_VER="0.0.0"/QPKG_VER="${{ steps.vars.outputs.sha_short }}"/g' ./qpkg/qpkg.cfg
          chmod 755 qpkg/shared/qnapexporter
          docker load --input /tmp/qdk-image.tar

      - name: Build qpkg for qnapexporter
        run: docker run --rm -v ${{ github.workspace }}:/work qdk-image:latest /usr/share/QDK/bin/qbuild --root /work/qpkg/

      - name: Validate qpkg file size
        run: |
          QPKG_FILE="qpkg/build/QNAPExporter_${{ steps.vars.outputs.sha_short }}.qpkg"
          if [ ! -f "$QPKG_FILE" ]; then
            echo "::error::QPKG file not found: $QPKG_FILE"
            exit 1
          fi
          SIZE=$(stat -c%s "$QPKG_FILE")
          echo "QPKG file size: $SIZE bytes"
          if [ "$SIZE" -lt 1000000 ]; then
            echo "::error::QPKG file is too small ($SIZE bytes). Expected at least 1MB. Build likely failed."
            exit 1
          fi

      - name: Validate qpkg trailer
        run: ./qpkg/validate-tail.sh "qpkg/build/QNAPExporter_${{ steps.vars.outputs.sha_short }}.qpkg"

      - name: Upload qpkg artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: QNAPExporter_${{ steps.vars.outputs.sha_short }}.qpkg
          path: qpkg/build/QNAPExporter_${{ steps.vars.outputs.sha_short }}.qpkg
          retention-days: 30
